#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dodoc"
name = "do•doc"
description.en = "Documentation tool for creativity"
description.fr = "Outil de documentation pour la créativité"

version = "11.1.3~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0-only"
website = "https://dodoc.fr/"
demo = "https://test.dodoc.fr/"
admindoc = "https://github.com/l-atelier-des-chercheurs/dodoc#readme"
code = "https://github.com/l-atelier-des-chercheurs/dodoc"

[integration]
yunohost = ">= 11.2.30"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "512M"
ram.build = "1000M"
ram.runtime = "512M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]

    url = "https://github.com/l-atelier-des-chercheurs/dodoc/archive/refs/heads/next-node.zip"
    sha256 = "01736e952a5e5db07f7929c91e380313745a340b69ad5f5c2a964e59ed41b96e"

    #autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]

    [resources.apt]
    packages = [
    "ffmpeg",
    "libasound2",
    "libatk-bridge2.0-0",
    "libatk1.0-0",
    "libatspi2.0-0",
    "libc++1-16",
    "libc++abi1-16",
    "libc6",
    "libcairo2",
    "libcups2",
    "libdav1d6",
    "libdbus-1-3",
    "libdouble-conversion3",
    "libdrm2",
    "libevent-2.1-7",
    "libexpat1",
    "libflac12",
    "libfontconfig1",
    "libfreetype6",
    "libgbm1",
    "libglib2.0-0",
    "libharfbuzz-subset0",
    "libharfbuzz0b",
    "libjpeg62-turbo",
    "liblcms2-2",
    "libminizip1",
    "libnspr4",
    "libnss3",
    "libopenh264-7",
    "libopenjp2-7",
    "libopus0",
    "libpango-1.0-0",
    "libpng16-16",
    "libpulse0",
    "libtiff6",
    "libudev1",
    "libunwind-16",
    "libx11-6",
    "libxcb1",
    "libxcomposite1",
    "libxdamage1",
    "libxext6",
    "libxfixes3",
    "libxkbcommon0",
    "libxml2",
    "libxnvctrl0",
    "libxrandr2",
    "libxslt1.1",
    "libzstd1",
    "zlib1g"
    ]
